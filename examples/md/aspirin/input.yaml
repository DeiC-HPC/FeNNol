device: cuda:0
model_file: ../ani2x.fnx

traj_format: arc
per_atom_energy: false
energy_unit: Ha

xyz_input:
  file: aspirin.xyz
  # whether the first column is the atom index (Tinker format)
  indexed: false
  # whether a comment line is present
  has_comment_line: true

# number of steps to perform
nsteps: 1000000
# timestep of the dynamics
dt[fs]: 0.5

# time between each saved frame
tdump[ps]: 1.0
# number of steps between each printing of the energy
nprint: 100
nsummary: 1000

## set the thermostat
# thermostat: NVE
thermostat: LGV

## Thermostat parameters
temperature: 300.0
# friction constant
gamma[THz]: 1.0
